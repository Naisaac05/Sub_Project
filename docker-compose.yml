version: '3.8'

services:
  # ===== MySQL =====
  mysql:
    image: mysql:8.0
    container_name: devmatch-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: adminuser
      MYSQL_DATABASE: devmatch
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: devmatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data

  # ===== Spring Boot Backend =====
  backend:
    build: ./backend
    container_name: devmatch-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devmatch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: root
      REDIS_HOST: redis
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AI_REVIEW_SERVICE_TOKEN: ${AI_REVIEW_SERVICE_TOKEN:-devmatch-local-ai-review-token}
      AI_REVIEW_CANDIDATES_PATH: /tmp/course-candidates
      AI_REVIEW_AUTO_CANDIDATES_PATH: /tmp/auto-candidates
      AI_REVIEW_CONCEPTS_V2_PATH: /app/ai/app/knowledge/concepts_v2
      PYTHON_AI_BASE_URL: http://host.docker.internal:8001
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./ai/app/knowledge/concepts_v2:/app/ai/app/knowledge/concepts_v2:ro
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
