spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/devmatch?useSSL=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
