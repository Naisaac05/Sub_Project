spring:
  application:
    name: devmatch

  # ===== Database (MySQL) =====
  datasource:
    url: jdbc:mysql://localhost:3307/devmatch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:adminuser}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # ===== Redis =====
  data:
    redis:
      host: localhost
      port: 6379

  # ===== Google OAuth2 =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar

# ===== Server =====
server:
  port: 8080

# ===== Observability =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:devmatch_super_secret_jwt_key_that_is_long_enough}
  access-token-expiration: 3600000 # 1시간 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

# ===== Auth Cookie / 관리자 환불 =====
app:
  auth:
    refresh-cookie:
      name: refresh_token
      path: /api/auth
      secure: ${REFRESH_COOKIE_SECURE:false} # 운영에서는 true (HTTPS)
      same-site: Strict
    reuse-window-seconds: 300 # 재사용 탐지 윈도우 (5분)
  payment:
    toss-cancel-enabled: ${TOSS_CANCEL_ENABLED:false} # 기본 false (local/dev). prod 는 application-prod.yml 에서 true.

  ai-review:
    enabled: ${AI_REVIEW_ENABLED:true}
    provider: ${AI_REVIEW_PROVIDER:PYTHON}
    candidates-path: ${AI_REVIEW_CANDIDATES_PATH:../ai/app/knowledge/candidates/course_concepts.jsonl}
    auto-candidates-path: ${AI_REVIEW_AUTO_CANDIDATES_PATH:../ai/app/knowledge/candidates/auto_candidates.jsonl}
    concepts-v2-path: ${AI_REVIEW_CONCEPTS_V2_PATH:../ai/app/knowledge/concepts_v2}
    streaming-enabled: ${AI_REVIEW_STREAMING_ENABLED:false}
    stream-timeout-seconds: ${AI_REVIEW_STREAM_TIMEOUT_SECONDS:45}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4.1-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/responses}
      temperature: ${OPENAI_TEMPERATURE:0.2}
    python:
      enabled: ${PYTHON_AI_ENABLED:true}
      base-url: ${PYTHON_AI_BASE_URL:http://localhost:8001}
      model: ${PYTHON_AI_MODEL:qwen3:1.7b}
      temperature: ${PYTHON_AI_TEMPERATURE:0.2}
      max-tokens: ${PYTHON_AI_MAX_TOKENS:256}
      num-ctx: ${PYTHON_AI_NUM_CTX:1024}
      num-thread: ${PYTHON_AI_NUM_THREAD:4}
      read-timeout-seconds: ${PYTHON_AI_READ_TIMEOUT_SECONDS:30}
      service-token: ${AI_REVIEW_SERVICE_TOKEN:}
    ollama:
      enabled: ${OLLAMA_ENABLED:true}
      model: ${OLLAMA_MODEL:qwen3:4b-q4_K_M}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      temperature: ${OLLAMA_TEMPERATURE:0.2}
      max-tokens: ${OLLAMA_MAX_TOKENS:256}
      num-ctx: ${OLLAMA_NUM_CTX:1024}
      num-thread: ${OLLAMA_NUM_THREAD:4}
      read-timeout-seconds: ${OLLAMA_READ_TIMEOUT_SECONDS:30}
      max-concurrent-generations: ${OLLAMA_MAX_CONCURRENT_GENERATIONS:1}
    evaluation:
      semantic-enabled: ${AI_REVIEW_SEMANTIC_EVALUATION_ENABLED:false}
    degraded:
      streaming-off: ${AI_REVIEW_STREAMING_OFF:false}
    rule-based:
      enabled: ${AI_REVIEW_RULE_BASED_ENABLED:true}
    limits:
      max-questions-per-wrong-answer: ${AI_REVIEW_MAX_QUESTIONS_PER_WRONG_ANSWER:3}
      max-questions-per-session: ${AI_REVIEW_MAX_QUESTIONS_PER_SESSION:10}
      max-user-answer-length: ${AI_REVIEW_MAX_USER_ANSWER_LENGTH:700}

    # 🧪 테스트 전용: AI 리뷰 세션 초기화 엔드포인트
    # 운영 환경에서는 절대 true 로 설정하지 말 것. 기본값 false.
    test-reset:
      enabled: ${AI_REVIEW_TEST_RESET_ENABLED:false}

# ===== Swagger =====
springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ===== 토스페이먼츠 =====
toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_sk_your_key}
    client-key: ${TOSS_CLIENT_KEY:test_ck_your_key}
    base-url: https://api.tosspayments.com/v1

# ===== Google Calendar =====
google:
  calendar:
    credentials-path: ${GOOGLE_CREDENTIALS_PATH:classpath:google-credentials.json}
    application-name: DevMatch
