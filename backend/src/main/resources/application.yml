spring:
  application:
    name: devmatch

  # ===== Database (MySQL) =====
  datasource:
    url: jdbc:mysql://localhost:3307/devmatch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:adminuser}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # ===== Redis =====
  data:
    redis:
      host: localhost
      port: 6379

  # ===== Google OAuth2 =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar

# ===== Server =====
server:
  port: 8080

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:devmatch_super_secret_jwt_key_that_is_long_enough}
  access-token-expiration: 3600000 # 1시간 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)

# ===== Auth Cookie / 관리자 환불 =====
app:
  auth:
    refresh-cookie:
      name: refresh_token
      path: /api/auth
      secure: ${REFRESH_COOKIE_SECURE:false} # 운영에서는 true (HTTPS)
      same-site: Strict
    reuse-window-seconds: 300 # 재사용 탐지 윈도우 (5분)
  payment:
    toss-cancel-enabled: ${TOSS_CANCEL_ENABLED:false} # 기본 false (local/dev). prod 는 application-prod.yml 에서 true.

# ===== Swagger =====
springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ===== 토스페이먼츠 =====
toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_sk_your_key}
    client-key: ${TOSS_CLIENT_KEY:test_ck_your_key}
    base-url: https://api.tosspayments.com/v1

# ===== Google Calendar =====
google:
  calendar:
    credentials-path: ${GOOGLE_CREDENTIALS_PATH:classpath:google-credentials.json}
    application-name: DevMatch
